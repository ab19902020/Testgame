  <script>
    // ==========================================
    // 1. ENGINE & CANVAS SETUP
    // ==========================================
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d", { alpha: false }); 
    const LOGICAL_W = 560; const LOGICAL_H = 620;
    const TS = 20, COLS = 28, ROWS = 31;
    
    // DEFINED THE MISSING COMBO MAX TIME CONSTANT
    const COMBO_MAX_TIME = 4.0;
    
    const wallCanvas = document.createElement('canvas'); 
    wallCanvas.width = LOGICAL_W; wallCanvas.height = LOGICAL_H;
    const wCtx = wallCanvas.getContext('2d', { alpha: true });

    const miniMapCanvas = document.getElementById("miniMapCanvas");
    const mCtx = miniMapCanvas.getContext("2d", { alpha: false });

    // UI Elements
    const root = document.documentElement;
    const scoreEl = document.getElementById("score"), levelEl = document.getElementById("level-display"), highScoreEl = document.getElementById("high-score");
    const livesContainer = document.getElementById("lives-container"), gameUiHeader = document.getElementById("game-ui-header");

    const statusOverlay = document.getElementById("status-overlay"), statusText = document.getElementById("status-text"), statusSub = document.getElementById("status-sub");
    
    const mapNameEl = document.getElementById("map-name"), heroNameEl = document.getElementById("hero-name"), enemyNameEl = document.getElementById("enemy-name");
    const comboUi = document.getElementById("combo-ui"), comboText = document.getElementById("combo-text");

    let gameLoopId = null, menuLoopId = null;
    let usingPhysicalControls = false;

    function vibrate(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch(e){} }

    // Safe, non-blocking Audio Engine
    const Audio = {
      ctx: null,
      init() { try { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); } catch(e) {} },
      play(f1, f2, type, dur, vol) {
        try {
          if (!this.ctx) return; 
          const o = this.ctx.createOscillator(), g = this.ctx.createGain();
          o.connect(g); g.connect(this.ctx.destination); o.type = type;
          o.frequency.setValueAtTime(f1, this.ctx.currentTime); o.frequency.exponentialRampToValueAtTime(f2, this.ctx.currentTime + dur);
          g.gain.setValueAtTime(vol, this.ctx.currentTime); g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + dur);
          o.start(); o.stop(this.ctx.currentTime + dur);
        } catch(e) {}
      },
      playEat() { this.play(800, 1200, 'sine', 0.05, 0.02); }, 
      playKill() { this.play(1000, 200, 'square', 0.3, 0.05); vibrate([40, 40]); },
      playDie() { this.play(300, 50, 'sawtooth', 0.6, 0.1); vibrate([80, 40, 80]); },
      playWin() { this.play(400, 1600, 'square', 0.8, 0.05); }
    };

    // ==========================================
    // 2. HERO & ENEMY DEFINITIONS
    // ==========================================
    const HEROES = [
        { name: "ASTRO", color: "#FFDD00", 
          draw: (ctx, r, dir, isMoving, time) => {
            let angle = dir.x===1?0 : dir.x===-1?Math.PI : dir.y===1?Math.PI/2 : dir.y===-1?-Math.PI/2 : 0;
            let squishX = isMoving ? 1 + Math.sin(time*20)*0.1 : 1; let squishY = isMoving ? 1 - Math.sin(time*20)*0.1 : 1;
            let mouthOpen = isMoving ? 0.2 + 0.2 * Math.sin(time * 25) : 0.1;
            ctx.save(); ctx.rotate(angle); ctx.scale(squishX, squishY);
            if (isMoving) {
                ctx.fillStyle = "#FF5500"; ctx.beginPath(); ctx.arc(-r*0.9, 0, r*0.5 + Math.random()*2, 0, Math.PI*2); ctx.fill();
            }
            ctx.fillStyle = "#FFCC00"; ctx.beginPath(); ctx.arc(0, 0, r*0.85, mouthOpen * Math.PI, (2 - mouthOpen) * Math.PI); ctx.lineTo(0, 0); ctx.fill();
            ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(r*0.1, -r*0.4, r*0.15, 0, Math.PI*2); ctx.arc(r*0.4, -r*0.4, r*0.15, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.arc(r*0.1+1, -r*0.4-1, r*0.05, 0, Math.PI*2); ctx.arc(r*0.4+1, -r*0.4-1, r*0.05, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)"; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.5)"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = "rgba(255, 255, 255, 0.6)"; ctx.beginPath(); ctx.ellipse(r*0.3, -r*0.5, r*0.3, r*0.1, Math.PI/6, 0, Math.PI*2); ctx.fill();
            ctx.restore();
          }
        },
        { name: "ROBO", color: "#AABBCC",
          draw: (ctx, r, dir, isMoving, time) => {
            let angle = dir.x===1?0 : dir.x===-1?Math.PI : dir.y===1?Math.PI/2 : dir.y===-1?-Math.PI/2 : 0;
            ctx.save(); ctx.rotate(angle);
            if (isMoving) { ctx.fillStyle = "#00E5FF"; ctx.fillRect(-r*1.2, -r*0.3, r*0.4 + Math.random()*2, r*0.6); }
            ctx.fillStyle = "#334455"; ctx.fillRect(-r*0.6, -r*0.8, r*1.2, r*1.6); // Treads
            ctx.fillStyle = "#8899AA"; ctx.fillRect(-r*0.8, -r*0.6, r*1.6, r*1.2); // Body
            ctx.fillStyle = "#222"; ctx.fillRect(r*0.2, -r*0.4, r*0.4, r*0.8); // Visor
            let eyeY = Math.sin(time*5)*r*0.3; // Scanning red eye
            ctx.fillStyle = "#FF0055"; ctx.fillRect(r*0.25, -r*0.1 + eyeY, r*0.3, r*0.2); 
            ctx.restore();
          }
        },
        { name: "NINJA", color: "#666666",
          draw: (ctx, r, dir, isMoving, time) => {
            let angle = dir.x===1?0 : dir.x===-1?Math.PI : dir.y===1?Math.PI/2 : dir.y===-1?-Math.PI/2 : 0;
            ctx.save(); ctx.rotate(angle);
            if (isMoving) {
               ctx.strokeStyle = "#FF0055"; ctx.lineWidth = 3; ctx.lineCap = "round";
               ctx.beginPath(); ctx.moveTo(-r*0.5, 0); ctx.lineTo(-r*1.5, -r*0.5 + Math.sin(time*20)*5); ctx.stroke();
               ctx.beginPath(); ctx.moveTo(-r*0.5, 0); ctx.lineTo(-r*1.5, r*0.5 - Math.sin(time*20)*5); ctx.stroke();
            }
            ctx.fillStyle = "#222"; ctx.beginPath(); ctx.arc(0, 0, r*0.85, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#FFEEDD"; ctx.fillRect(r*0.2, -r*0.5, r*0.5, r*1.0); // Face slit

            ctx.fillStyle = "#FF0055"; ctx.fillRect(r*0.1, -r*0.6, r*0.2, r*1.2); // Headband
            ctx.restore();
          }
        },
        { name: "UFO", color: "#00FF66",
          draw: (ctx, r, dir, isMoving, time) => {
            ctx.save();
            let bob = isMoving ? Math.sin(time*15)*2 : 0;
            ctx.translate(0, bob);
            ctx.fillStyle = "rgba(0, 229, 255, 0.5)"; ctx.beginPath(); ctx.arc(0, 0, r*0.6, Math.PI, 0); ctx.fill();
            let headAngle = dir.x===1?0 : dir.x===-1?Math.PI : dir.y===1?Math.PI/2 : dir.y===-1?-Math.PI/2 : 0;
            ctx.save(); ctx.rotate(headAngle);
            ctx.fillStyle = "#00FF66"; ctx.beginPath(); ctx.arc(0, -r*0.1, r*0.35, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000"; ctx.beginPath(); ctx.ellipse(r*0.1, -r*0.2, r*0.1, r*0.15, Math.PI/4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(r*0.1, 0, r*0.1, r*0.15, -Math.PI/4, 0, Math.PI*2); ctx.fill();
            ctx.restore();
            ctx.fillStyle = "#8899AA"; ctx.beginPath(); ctx.ellipse(0, r*0.2, r, r*0.3, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = (Math.floor(time*5)%2===0) ? "#FF0055" : "#00E5FF";
            ctx.beginPath(); ctx.arc(-r*0.6, r*0.2, 2, 0, Math.PI*2); ctx.arc(0, r*0.2, 2, 0, Math.PI*2); ctx.arc(r*0.6, r*0.2, 2, 0, Math.PI*2); ctx.fill();
            ctx.restore();
          }
        }
    ];

    const ENEMIES = [
        { name: "JELLY SLIMES",
          draw: (ctx, r, color, state, dir, time) => {
             let drawColor = state==="SCARED" ? (Math.floor(time*8)%2===0 ? "#FFF" : "#4444FF") : color;
             let bounce = Math.abs(Math.sin(time * 10)) * 2;
             ctx.save(); ctx.translate(0, -bounce);
             ctx.fillStyle = drawColor; ctx.beginPath(); ctx.arc(0, 2, r*0.9, Math.PI, 0); 
             let wiggle = Math.sin(time * 15) * 2;
             ctx.lineTo(r*0.9, r*0.8); ctx.quadraticCurveTo(r*0.45, r*0.8 + wiggle + 2, 0, r*0.8); ctx.quadraticCurveTo(-r*0.45, r*0.8 - wiggle + 2, -r*0.9, r*0.8); ctx.fill();
             if (state === "SCARED") {
                 ctx.strokeStyle = "#FFDD00"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(-4,2); ctx.lineTo(-2,0); ctx.lineTo(0,2); ctx.lineTo(2,0); ctx.lineTo(4,2); ctx.stroke();
                 ctx.fillStyle="#FFDD00"; ctx.beginPath(); ctx.arc(-3,-3,1.5,0,Math.PI*2); ctx.arc(3,-3,1.5,0,Math.PI*2); ctx.fill();

                 ctx.fillStyle="#FFF"; ctx.beginPath(); ctx.ellipse(-4+dir.x*1.5, -2+dir.y*1.5, 3.5, 4.5, 0,0,Math.PI*2); ctx.ellipse(4+dir.x*1.5, -2+dir.y*1.5, 3.5, 4.5, 0,0,Math.PI*2); ctx.fill();
                 ctx.fillStyle="#000"; ctx.beginPath(); ctx.arc(-4+dir.x*2.5, -2+dir.y*2.5, 2, 0,Math.PI*2); ctx.arc(4+dir.x*2.5, -2+dir.y*2.5, 2, 0,Math.PI*2); ctx.fill();
                 ctx.fillStyle="#FFF"; ctx.beginPath(); ctx.arc(-5+dir.x*2.5, -3+dir.y*2.5, 0.8, 0,Math.PI*2); ctx.arc(3+dir.x*2.5, -3+dir.y*2.5, 0.8, 0,Math.PI*2); ctx.fill();
             }
             ctx.restore();

        },
        { name: "SPACE BUGS",
          draw: (ctx, r, color, state, dir, time) => {
             let drawColor = state==="SCARED" ? (Math.floor(time*8)%2===0 ? "#FFF" : "#4444FF") : color;
             ctx.save(); let angle = dir.x===1?0 : dir.x===-1?Math.PI : dir.y===1?Math.PI/2 : dir.y===-1?-Math.PI/2 : 0; ctx.rotate(angle);
             let wiggle = Math.sin(time*20)*4;
             ctx.strokeStyle = drawColor; ctx.lineWidth = 2.5; ctx.lineCap="round";
             ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-r*0.8, -r*0.8+wiggle); ctx.moveTo(0,0); ctx.lineTo(-r*0.8, r*0.8-wiggle); ctx.moveTo(0,0); ctx.lineTo(r*0.2, -r*0.9-wiggle); ctx.moveTo(0,0); ctx.lineTo(r*0.2, r*0.9+wiggle); ctx.stroke();
             ctx.fillStyle = drawColor; ctx.beginPath(); ctx.ellipse(0, 0, r*0.8, r*0.6, 0, 0, Math.PI*2); ctx.fill();

    function spawnParticles(x, y, color, count=5, speed=1) {
        let spawned = 0;
        for (let i=0; i<MAX_PARTICLES && spawned<count; i++) {
            let p = particlePool[i];
            if (!p.active) {
                p.active = true; p.x = x; p.y = y;

                spawned++;

        }

    function isWall(c, r, allowGate = false) {
        if (c < 0 || c >= COLS) {
            // Tunnel strict boundary fix
            if (r >= 0 && r < ROWS && map[r] && map[r][0] !== 1) return false;
            return true;
        }
        if (r < 0 || r >= ROWS || !map[r]) return true;  
        const val = map[r][c]; return val === 1 || (val === 4 && !allowGate);
    }

    class Entity {
      constructor(x, y, speed) {
        this.baseX = x; this.baseY = y; this.x = x; this.y = y;
        this.baseSpeed = speed; this.speed = speed;
        this.dir = {x: 0, y: 0}; this.radius = TS * 0.45;
        this.history = [];
      }
      reset() { this.x = this.baseX; this.y = this.baseY; this.dir = {x: 0, y: 0}; this.speed = this.baseSpeed; this.history = []; }
      getTile() { return { c: Math.floor(this.x / TS), r: Math.floor(this.y / TS) }; }
      updateHistory() { this.history.unshift({x: this.x, y: this.y, dir: this.dir}); if (this.history.length > 4) this.history.pop(); }
    }

    class HeroActor extends Entity {
      constructor(x, y) { super(x, y, 130); this.nextDir = {x: 0, y: 0}; }
      reset() { super.reset(); this.nextDir = {x: 0, y: 0}; this.dir = {x: -1, y: 0}; this.speed = this.baseSpeed + (currentLevel * 2); }
      
      move(dt) {
        let isMoving = this.dir.x !== 0 || this.dir.y !== 0;
        if (isMoving) this.updateHistory();

        if (this.nextDir.x === -this.dir.x && this.nextDir.y === -this.dir.y && isMoving) {
            this.dir = {...this.nextDir}; this.nextDir = {x:0, y:0};
        }

        let tC = Math.floor(this.x / TS); let tR = Math.floor(this.y / TS);
        let cx = tC * TS + TS/2; let cy = tR * TS + TS/2;

        if (this.nextDir.x !== 0 || this.nextDir.y !== 0) {
            if (this.nextDir.x !== this.dir.x || this.nextDir.y !== this.dir.y) {
                if (!isWall(tC + this.nextDir.x, tR + this.nextDir.y)) {
                    const distToCenter = Math.hypot(this.x - cx, this.y - cy);
                    if (distToCenter <= (TS * 0.5)) { 
                        this.x = cx; this.y = cy; this.dir = {...this.nextDir}; this.nextDir = {x:0, y:0};
                    }
                }
            }
        }

        let nextX = this.x + this.dir.x * this.speed * dt; let nextY = this.y + this.dir.y * this.speed * dt;
        this.x = nextX; this.y = nextY;

        const curC = Math.floor(this.x / TS), curR = Math.floor(this.y / TS);
        if (this.dir.x > 0 && isWall(Math.floor((this.x + this.radius) / TS), curR)) this.x = Math.floor((this.x + this.radius) / TS) * TS - this.radius - 0.01;
        if (this.dir.x < 0 && isWall(Math.floor((this.x - this.radius) / TS), curR)) this.x = Math.floor(this.x / TS) * TS + TS + this.radius + 0.01;
        if (this.dir.y > 0 && isWall(curC, Math.floor((this.y + this.radius) / TS))) this.y = Math.floor((this.y + this.radius) / TS) * TS - this.radius - 0.01;
        if (this.dir.y < 0 && isWall(curC, Math.floor((this.y - this.radius) / TS))) this.y = Math.floor(this.y / TS) * TS + TS + this.radius + 0.01;

        if (this.x < -TS) this.x = COLS * TS + TS; if (this.x > COLS * TS + TS) this.x = -TS;

        const realC = Math.floor(this.x / TS), realR = Math.floor(this.y / TS);
        if (realR >= 0 && realR < ROWS && realC >= 0 && realC < COLS && map[realR]) {
           const val = map[realR][realC];
           if (val === 2 || val === 3) {
             const pcx = realC * TS + TS/2, pcy = realR * TS + TS/2;
             if (Math.hypot(this.x - pcx, this.y - pcy) < TS/2) {
                 map[realR][realC] = 0; itemsRemaining--; Audio.playEat();
                 spawnParticles(pcx, pcy, val === 3 ? "#FFF" : THEMES[currentMapIdx].itemColor, val===3?15:2);
                 
                 comboTimer = COMBO_MAX_TIME;
                 let pts = (val === 2 ? 10 : 50) * comboCount; score += pts; scoreEl.innerText = score;
                 if (score > highScore) { 
                     highScore = score; 
                     if (highScoreEl) highScoreEl.innerText = highScore; 
                     localStorage.setItem('munchUniverse_High', highScore); 
                 }
                 
                 if ((initialItems - itemsRemaining) % 8 === 0 && comboCount < 5) { 
                     comboCount++; comboUi.classList.remove("opacity-0", "scale-50"); comboUi.classList.add("opacity-100", "scale-100"); comboText.innerText = `SUPER x${comboCount}!`;
                 }

                 if (val === 3) { 
                     powerTimer = Math.max(2, 7.0 - (currentLevel * 0.5)); 
                     enemiesList.forEach(g => { if (g.state === "CHASE" || g.state === "SCATTER") { g.state = "SCARED"; g.dir = {x: -g.dir.x, y: -g.dir.y}; g.lastDecisionTile = null; }});
                 }
                 
                 // CRITICAL FIX: Level Clear
                 if (itemsRemaining <= 0) levelComplete();
             }
           }
        }
      }

      draw(ctx) {
        let isMoving = this.dir.x !== 0 || this.dir.y !== 0;
        const heroDef = HEROES[currentHeroIdx];
        
        if (this.history.length > 0 && gameState === "PLAY") {
            this.history.forEach((pos, i) => {
                let size = this.radius * (1 - i/5); let alpha = (1 - i/5) * 0.3;
                ctx.save(); ctx.translate(pos.x, pos.y); ctx.globalAlpha = alpha;
                heroDef.draw(ctx, size, pos.dir, false, gameTime);
                ctx.restore();
            });
            ctx.globalAlpha = 1.0;
        }

        ctx.save(); ctx.translate(this.x, this.y); 
        heroDef.draw(ctx, this.radius, this.dir, isMoving, gameTime);
        ctx.restore();
      }
    }

    class EnemyActor extends Entity {
      constructor(x, y, typeIdx) {
        super(x, y, 90); this.typeIdx = typeIdx;
        this.baseDelay = typeIdx * 2; this.state = "HOUSE"; this.target = {c: 0, r: 0}; 
        this.stepTime = 0; this.lastDecisionTile = null;
      }
      reset() {
        super.reset(); this.state = "HOUSE"; 
        this.speed = this.baseSpeed + (currentLevel * 3);
        this.stepTime = gameTime + this.baseDelay + 1.5; 
        this.lastDecisionTile = null;
      }
      
      move(dt) {
        if (this.state === "HOUSE") {
            this.y = this.baseY + Math.sin(gameTime * 5) * 4;
            if (gameTime > this.stepTime && gameState === "PLAY") {
                this.x = 13.5 * TS; this.y = 9.5 * TS; this.state = "CHASE"; this.dir = {x: -1, y: 0}; this.lastDecisionTile = null;
            }
            return;
        }

        this.updateHistory();

        let currentSpeed = this.speed;
        if (this.state === "SCARED") currentSpeed = this.speed * 0.55;
        if (this.state === "DEAD") currentSpeed = this.speed * 5.0; 

        let nextX = this.x + this.dir.x * currentSpeed * dt;
        let nextY = this.y + this.dir.y * currentSpeed * dt;
        
        let tC = Math.floor(this.x / TS); let tR = Math.floor(this.y / TS);
        let cx = tC * TS + TS/2; let cy = tR * TS + TS/2;

        if (tC < 0 || tC >= COLS) {
             if (this.x < -TS) { this.x = COLS * TS + TS; } else if (this.x > COLS * TS + TS) { this.x = -TS; }
             else { this.x = nextX; this.y = nextY; }
             return;
        }

        if (this.state === "DEAD" && tC >= 12 && tC <= 15 && tR >= 10 && tR <= 12) {
            this.state = "HOUSE"; 
            this.stepTime = gameTime + 5.0; // 5 SECOND RESPAWN
            this.x = 13.5 * TS; this.y = 11.5 * TS; this.lastDecisionTile = null; return;
        }

        let crossedCenter = false;
        if (this.dir.x > 0 && this.x <= cx && nextX >= cx) crossedCenter = true;
        if (this.dir.x < 0 && this.x >= cx && nextX <= cx) crossedCenter = true;
        if (this.dir.y > 0 && this.y <= cy && nextY >= cy) crossedCenter = true;
        if (this.dir.y < 0 && this.y >= cy && nextY <= cy) crossedCenter = true;

        if (crossedCenter && (!this.lastDecisionTile || this.lastDecisionTile.c !== tC || this.lastDecisionTile.r !== tR)) {
            this.x = cx; this.y = cy; this.lastDecisionTile = {c: tC, r: tR};
            this.updateTarget();
            const dirs = [ {x:0, y:-1}, {x:-1, y:0}, {x:0, y:1}, {x:1, y:0} ];
            
            let validDirs = dirs.filter(d => {
                if (d.x === -this.dir.x && d.y === -this.dir.y && this.state !== "SCARED") return false;
                return !isWall(tC + d.x, tR + d.y, this.state === "DEAD");
            });
            if (validDirs.length === 0) validDirs = [{x: -this.dir.x, y: -this.dir.y}];

            if (validDirs.length > 0) {
                let bestDir = validDirs[0]; 
                
                if (this.state === "SCARED") {
                    let maxDist = -1;
                    for (const d of validDirs) {
                        let testC = tC + d.x; let testR = tR + d.y;
                        const distSq = Math.pow(testC - mainHero.getTile().c, 2) + Math.pow(testR - mainHero.getTile().r, 2);
                        if (distSq > maxDist) { maxDist = distSq; bestDir = d; }
                    }
                } else {
                    let minScore = Infinity;
                    for (const d of validDirs) {
                        let testC = tC + d.x; let testR = tR + d.y;
                        const distSq = Math.pow(testC - this.target.c, 2) + Math.pow(testR - this.target.r, 2);
                        if (distSq < minScore) { minScore = distSq; bestDir = d; }
                    }
                }
                this.dir = bestDir;
            }
            
            let remainder = Math.hypot(nextX - cx, nextY - cy);
            this.x += this.dir.x * remainder; this.y += this.dir.y * remainder;
        } else {
            this.x = nextX; this.y = nextY;
            if (this.dir.x > 0 && isWall(Math.floor((this.x + this.radius) / TS), tR, this.state === "DEAD")) this.x = Math.floor((this.x + this.radius) / TS) * TS - this.radius - 0.01;
            if (this.dir.x < 0 && isWall(Math.floor((this.x - this.radius) / TS), tR, this.state === "DEAD")) this.x = Math.floor(this.x / TS) * TS + TS + this.radius + 0.01;
            if (this.dir.y > 0 && isWall(tC, Math.floor((this.y + this.radius) / TS), this.state === "DEAD")) this.y = Math.floor((this.y + this.radius) / TS) * TS - this.radius - 0.01;
            if (this.dir.y < 0 && isWall(tC, Math.floor((this.y - this.radius) / TS), this.state === "DEAD")) this.y = Math.floor(this.y / TS) * TS + TS + this.radius + 0.01;
        }
      }
      
      updateTarget() {
        if (this.state === "DEAD") { this.target = {c: 13, r: 12}; return; } 
        const hTile = mainHero.getTile();
        if (this.typeIdx === 0) { this.target = hTile; } 
        else if (this.typeIdx === 1) { this.target = { c: hTile.c + mainHero.dir.x * 4, r: hTile.r + mainHero.dir.y * 4 }; } 
        else if (this.typeIdx === 2) {
            let pC = hTile.c + mainHero.dir.x * 2; let pR = hTile.r + mainHero.dir.y * 2;
            let tTile = enemiesList[0].getTile();
            this.target = { c: tTile.c + (pC - tTile.c) * 2, r: tTile.r + (pR - tTile.r) * 2 };
        } else if (this.typeIdx === 3) {
            let distSq = Math.pow(hTile.c - this.getTile().c, 2) + Math.pow(hTile.r - this.getTile().r, 2);
            if (distSq > 64) this.target = hTile; else this.target = {c: 1, r: 29};
        }
      }

      draw(ctx) {
        const theme = THEMES[currentMapIdx];
        const enemyDef = ENEMIES[currentEnemyIdx];
        
        if (this.state === "DEAD") {
            ctx.save(); ctx.translate(this.x, this.y); Render.deadEnemy(ctx, this.dir); ctx.restore(); return;
        }

        if (this.history.length > 0 && gameState === "PLAY" && this.state !== "DEAD") {
            this.history.forEach((pos, i) => {
                let size = this.radius * (1 - i/5); let alpha = (1 - i/5) * 0.2;
                ctx.save(); ctx.translate(pos.x, pos.y); ctx.globalAlpha = alpha;
                enemyDef.draw(ctx, size, theme.enemyColors[this.typeIdx], this.state, pos.dir, gameTime);
                ctx.restore();
            });
            ctx.globalAlpha = 1.0;
        }

        ctx.save(); ctx.translate(this.x, this.y);
        enemyDef.draw(ctx, this.radius, theme.enemyColors[this.typeIdx], this.state, this.dir, gameTime);
        ctx.restore();
      }
    }

    const mainHero = new HeroActor(13.5 * TS, 19.5 * TS);
    const enemiesList = [
      new EnemyActor(13.5 * TS, 9.5 * TS, 0), new EnemyActor(13.5 * TS, 11.5 * TS, 1),
      new EnemyActor(11.5 * TS, 11.5 * TS, 2), new EnemyActor(15.5 * TS, 11.5 * TS, 3)
    ];

    function preRenderWalls() {
      const theme = THEMES[currentMapIdx];
      wCtx.clearRect(0,0, wallCanvas.width, wallCanvas.height);
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          let val = Number(theme.layout[r][c]);
          const x = c * TS + TS/2, y = r * TS + TS/2;
          if (val === 1) {
            let conn = {
                u: r>0 && Number(theme.layout[r-1][c])===1, d: r<ROWS-1 && Number(theme.layout[r+1][c])===1,
                l: c>0 && Number(theme.layout[r][c-1])===1, r: c<COLS-1 && Number(theme.layout[r][c+1])===1
            };
            Render.wall(wCtx, x, y, conn, theme);
          } else if (val === 4) {
             wCtx.strokeStyle = "#FFF"; wCtx.lineWidth = 4;
             wCtx.beginPath(); wCtx.moveTo(x-TS/2, y); wCtx.lineTo(x+TS/2, y); wCtx.stroke();
          }
        }
      }
    }

    function initMap() {
      const theme = THEMES[currentMapIdx];
      map = []; initialItems = 0;
      particlePool.forEach(p => p.active = false); 
      for (let r = 0; r < ROWS; r++) {
        const row = [];
        for (let c = 0; c < COLS; c++) {
          let val = Number(theme.layout[r][c]);
          if (val === 2 || val === 3) initialItems++;
          row.push(val);
        }
        map.push(row);
      }
      itemsRemaining = initialItems;
      preRenderWalls(); 
    }

    function checkCollisions() {
      if (gameState !== "PLAY") return;

      for (let g of enemiesList) {
        if (g.state === "DEAD") continue;
        if (Math.hypot(mainHero.x - g.x, mainHero.y - g.y) < TS * 0.8) {
          if (g.state === "SCARED") {
            Audio.playKill(); g.state = "DEAD"; 
            g.lastDecisionTile = null; g.x = Math.floor(g.x/TS)*TS + TS/2; g.y = Math.floor(g.y/TS)*TS + TS/2;
            
            const pts = 200 * comboCount; score += pts; scoreEl.innerText = score;
            floatingTexts.push({x: g.x, y: g.y, text: pts, timer: 1.0}); spawnParticles(g.x, g.y, "#FFF", 30);
          } else { 
            Audio.playDie();
            gameState = "DEAD"; lives--; updateLivesUI();
            
            canvas.classList.add('hit-flash'); setTimeout(()=>canvas.classList.remove('hit-flash'), 200);
            spawnParticles(mainHero.x, mainHero.y, HEROES[currentHeroIdx].color, 60);
            
            setTimeout(() => {
              if (lives <= 0) gameOver();
              else { 
                  comboCount = 1; comboUi.classList.remove("opacity-100", "scale-100"); comboUi.classList.add("opacity-0", "scale-50");
                  powerTimer = 0; mainHero.reset(); enemiesList.forEach(gh => gh.reset()); gameState = "PLAY"; 
              }
            }, 1500);
          }
        }
      }
    }

    function updateLivesUI() {
        livesContainer.innerHTML = '';
        const c = HEROES[currentHeroIdx].color;
        for(let i=0; i<lives; i++) livesContainer.innerHTML += `<div class="w-3.5 h-3.5 rounded-full border border-black" style="background-color:${c}; box-shadow: 0 0 8px ${c}"></div>`;
    }

    function showStatus(title, sub, delay) {
        statusOverlay.classList.remove("hidden");
        statusText.innerText = title; statusSub.innerText = sub;
        setTimeout(() => statusOverlay.classList.remove("opacity-0"), 10);
        setTimeout(() => {
            statusOverlay.classList.add("opacity-0");
            setTimeout(() => statusOverlay.classList.add("hidden"), 300);
        }, delay);
    }

    function gameOver() {
        gameState = "OVER"; showStatus("GAME OVER", "BETTER LUCK NEXT TIME", 3000);
        setTimeout(() => returnToMenu(), 3200);
    }

    function levelComplete() {
        gameState = "OVER"; Audio.playWin(); 
        currentLevel++; levelEl.innerText = currentLevel;
        currentMapIdx = (currentMapIdx + 1) % THEMES.length; 
        updateSelectors(); 

        showStatus("STAGE CLEAR!", "WARPING TO NEXT WORLD...", 3000);
        setTimeout(() => {
            initMap(); comboCount = 1; comboUi.classList.add("opacity-0", "scale-50");
            mainHero.reset(); enemiesList.forEach(g => g.reset()); gameState = "PLAY"; 
        }, 3000);
    }

    function returnToMenu() {
        gameState = "MENU";
        cancelAnimationFrame(gameLoopId);
        mainMenu.classList.remove("hidden");
        gameUiHeader.classList.add("opacity-0"); 
        if(!usingPhysicalControls) dPadZone.classList.remove("opacity-0", "pointer-events-none");
        updateSelectors();
        menuLoopId = requestAnimationFrame(drawLiveMiniMap);
    }

    // ==========================================
    // 4. MAIN GAME LOOP
    // ==========================================
    function drawGame() {
      ctx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);
      ctx.drawImage(wallCanvas, 0, 0);

      const theme = THEMES[currentMapIdx];
      
      for (let r = 0; r < ROWS; r++) {
         for (let c = 0; c < COLS; c++) {
            if (map[r] && map[r][c] === 2) { Render.pellet(ctx, c*TS+TS/2, r*TS+TS/2, false, gameTime, theme); } 
            else if (map[r] && map[r][c] === 3) { Render.pellet(ctx, c*TS+TS/2, r*TS+TS/2, true, gameTime, theme); }
         }
      }

      for(let i=0; i<MAX_PARTICLES; i++) {
         let p = particlePool[i]; if(!p.active) continue;
         ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
         ctx.beginPath(); ctx.arc(p.x, p.y, 1.5 + (p.life*2), 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1.0;
      
      if (gameState !== "DEAD" || Math.floor(gameTime*10)%2 === 0) mainHero.draw(ctx);
      if (gameState !== "DEAD") enemiesList.forEach(g => g.draw(ctx));

      ctx.font = `bold 18px 'Paytone One', sans-serif`; ctx.textAlign = "center";
      for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const ft = floatingTexts[i]; ctx.fillStyle = `rgba(255, 255, 255, ${ft.timer})`;
        ctx.fillText(ft.text, ft.x, ft.y); ft.y -= 25 * 0.016; ft.timer -= 0.016;
        if (ft.timer <= 0) floatingTexts.splice(i, 1);
      }
    }

    function pollGamepads() {
        const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
        for (let i = 0; i < gamepads.length; i++) {
            const gp = gamepads[i];
            if (gp) {
                hideControls();
                if (gp.axes[0] < -0.5) setDirection(-1, 0);
                else if (gp.axes[0] > 0.5) setDirection(1, 0);
                if (gp.axes[1] < -0.5) setDirection(0, -1);
                else if (gp.axes[1] > 0.5) setDirection(0, 1);
                
                if (gp.buttons[12]?.pressed) setDirection(0, -1); 
                if (gp.buttons[13]?.pressed) setDirection(0, 1);  
                if (gp.buttons[14]?.pressed) setDirection(-1, 0); 
                if (gp.buttons[15]?.pressed) setDirection(1, 0);  
                
                if ((gp.buttons[0]?.pressed || gp.buttons[9]?.pressed) && gameState === "MENU") {
                    document.getElementById("start-btn").click();
                }
            }
        }
    }

    function loop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = Math.min((timestamp - lastTime) / 1000, 0.04); 
      lastTime = timestamp;

      pollGamepads();

      if (gameState === "PLAY") {
          gameTime += dt;
          
          if (comboTimer > 0) {
              comboTimer -= dt;
              if (comboTimer <= 0) { comboCount = 1; comboUi.classList.remove("opacity-100", "scale-100"); comboUi.classList.add("opacity-0", "scale-50"); }
          }
          if (powerTimer > 0) {
              powerTimer -= dt;
              if (powerTimer <= 0) { enemiesList.forEach(g => { if(g.state === "SCARED") g.state = "CHASE"; }); }
          }

          for(let i=0; i<MAX_PARTICLES; i++) {
             let p = particlePool[i]; if(!p.active) continue;
             p.vx *= 0.90; p.vy *= 0.90; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
             if(p.life <= 0) p.active = false;
          }

          mainHero.move(dt); enemiesList.forEach(g => g.move(dt)); checkCollisions();
      } else if (gameState === "DEAD" || gameState === "OVER") {
          gameTime += dt;
      }

      drawGame(); 
      gameLoopId = requestAnimationFrame(loop);
    }

    // ==========================================
    // 5. INPUT CONTROLS
    // ==========================================
    function hideControls() {
        if (!usingPhysicalControls) {
            dPadZone.classList.add('opacity-0', 'pointer-events-none');
            usingPhysicalControls = true;
        }
    }

    function setDirection(dx, dy) { 
        if (gameState === "PLAY") { mainHero.nextDir = {x: dx, y: dy}; vibrate(15); }
    }

    window.addEventListener("keydown", (e) => {
      hideControls();
      if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
      if (e.key === "ArrowUp" || e.key === "w") setDirection(0, -1);
      if (e.key === "ArrowDown" || e.key === "s") setDirection(0, 1);
      if (e.key === "ArrowLeft" || e.key === "a") setDirection(-1, 0);
      if (e.key === "ArrowRight" || e.key === "d") setDirection(1, 0);
      if (e.key === "Enter" || e.key === " ") {
          if (gameState === "MENU") document.getElementById("start-btn").click();
      }
    });

    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, {passive: false});
    canvas.addEventListener('touchmove', (e) => {
       e.preventDefault(); if (gameState !== "PLAY") return;
       let touchX = e.touches[0].clientX; let touchY = e.touches[0].clientY;
       const dx = touchX - touchStartX; const dy = touchY - touchStartY;
       if (Math.abs(dx) > 15 || Math.abs(dy) > 15) {
          if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 1 : -1, 0); 
          else setDirection(0, dy > 0 ? 1 : -1);
          touchStartX = touchX; touchStartY = touchY; 
       }
    }, {passive: false});

    document.querySelectorAll('.d-pad-btn').forEach(btn => {
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault(); btn.classList.add('active-sim');
        const dir = btn.getAttribute('data-dir');
        if (dir === 'up') setDirection(0, -1); if (dir === 'down') setDirection(0, 1);
        if (dir === 'left') setDirection(-1, 0); if (dir === 'right') setDirection(1, 0);
      });
      btn.addEventListener('pointerup', () => btn.classList.remove('active-sim'));
      btn.addEventListener('pointerout', () => btn.classList.remove('active-sim'));
    });

    // ==========================================
    // 6. BOOT SEQUENCE
    // ==========================================
    document.getElementById("start-btn").addEventListener('click', () => {
       try { Audio.init(); vibrate(50); } catch(e){}
       
       cancelAnimationFrame(menuLoopId);
       
       score = 0; lives = 3; currentLevel = 1; scoreEl.innerText = score; levelEl.innerText = currentLevel;
       
       mainMenu.classList.add('hidden');
       
       gameUiHeader.classList.remove('hidden');
       void gameUiHeader.offsetWidth; 
       gameUiHeader.classList.remove('opacity-0');
       
       if (!usingPhysicalControls) {
           dPadZone.classList.remove('hidden', 'pointer-events-none');
           void dPadZone.offsetWidth; 
           dPadZone.classList.remove('opacity-0');
       }

       initMap(); updateLivesUI(); mainHero.reset(); enemiesList.forEach(g => g.reset());
       comboCount = 1; floatingTexts = [];
       
       showStatus("GET READY!", "GO!", 1500);
       setTimeout(() => { 
           gameState = "PLAY"; gameTime = 0; lastTime = performance.now(); 
           gameLoopId = requestAnimationFrame(loop); 
       }, 1500);
    });

    document.getElementById("quit-btn").addEventListener('click', () => { vibrate(30); returnToMenu(); });

    // SAFEGUARD THE FULLSCREEN BUTTON SO IT DOESN'T CRASH IF IT DOESN'T EXIST
    const fsBtn = document.getElementById("fs-btn");
    if (fsBtn) {
        fsBtn.addEventListener('click', () => {
           if (!document.fullscreenElement) {
               document.documentElement.requestFullscreen().then(() => {
                   if(screen.orientation && screen.orientation.lock) screen.orientation.lock('portrait').catch(()=>{});
               }).catch(()=>{}); 
           } else { document.exitFullscreen(); }
        });
    }

    // START
    // Force a small timeout to let the DOM settle, ensuring the canvas context is ready
    setTimeout(() => {
        updateSelectors(); 
        menuLoopId = requestAnimationFrame(drawLiveMiniMap);
    }, 50);

  </script>
</body>
</html>
