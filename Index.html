        // 🔊 AUDIO ENGINE
        const Sfx = {
          ctx: null, noiseBuffer: null, fuseNodes: null,

              Sfx.ctx = new (window.AudioContext || window.webkitAudioContext)();
              const bufferSize = Sfx.ctx.sampleRate * 2; Sfx.noiseBuffer = Sfx.ctx.createBuffer(1, bufferSize, Sfx.ctx.sampleRate);

              } else if (Sfx.fuseNodes) {

          playExplosion: (isDirty, isMega, rangeIntensity = 1) => {

              fm.connect(fmGain); fmGain.connect(osc.frequency); osc.frequency.setValueAtTime(150, t); osc.frequency.exponentialRampToValueAtTime(20, t + 0.6);

          update: (dt) => {

            for (let i = GameJuice.shockwaves.length - 1; i >= 0; i--) { let sw = GameJuice.shockwaves[i]; sw.life -= (dt/400); sw.radius += 100 * (dt/1000); if (sw.life <= 0) GameJuice.shockwaves.splice(i, 1); }
            for (let i = GameJuice.particles.length - 1; i >= 0; i--) {
              let p = GameJuice.particles[i]; p.life -= (dt/1000);

            if (c < 0 || c >= s.cols || r < 0 || r >= s.rows) return false;
            if (s.board[r*s.cols + c] === 1) return false;
            if (!bot.isGhost && s.board[r*s.cols + c] === 2) return false;
            if (s.bombs.some(b => b.c === c && b.r === r && b.dx === 0 && b.dy === 0 && !b.isFlying && !b.carriedBy && !(c === ignoreBombC && r === ignoreBombR))) return false;
            if (s.boss && s.boss.active) { const bc = Math.floor(s.boss.x/TILE_SIZE); const br = Math.floor(s.boss.y/TILE_SIZE); if (c >= bc && c <= bc+1 && r >= br && r <= br+1) return false; }
            return true;
          },
          buildDangerMap: (s, additionalBombs = []) => {
            let map = Array(s.cols * s.rows).fill(0); 
            const allBombs = [...s.bombs.filter(b=>!b.carriedBy && !b.isFlying), ...additionalBombs];
            s.explosions.forEach(e => { if(e.c >= 0 && e.c < s.cols && e.r >= 0 && e.r < s.rows) map[e.r*s.cols + e.c] = 2; });
            if (s.boss && s.boss.active && s.boss.state === 'charge_laser') {
                for(let c=0; c<s.cols; c++) map[Math.floor(s.boss.y/TILE_SIZE) * s.cols + c] = 2;
                for(let r=0; r<s.rows; r++) map[r * s.cols + Math.floor(s.boss.x/TILE_SIZE)] = 2;
            }
            allBombs.forEach(b => {
                const threatLevel = b.timer < 800 ? 2 : 1; 
                if(b.c >= 0 && b.c < s.cols && b.r >= 0 && b.r < s.rows) map[b.r*s.cols + b.c] = Math.max(map[b.r*s.cols + b.c], threatLevel); 
                if (b.isDirty || b.isMega) {
                    const rRad = b.isDirty ? Math.min(6, 3 + Math.floor(b.range / 2)) : Math.min(4, b.range); 
                    for(let r = -rRad; r <= rRad; r++) for(let c = -rRad; c <= rRad; c++) {
                       const nc = b.c+c, nr = b.r+r; if(nc>0 && nc<s.cols-1 && nr>0 && nr<s.rows-1 && s.board[nr*s.cols + nc] !== 1) map[nr*s.cols + nc] = Math.max(map[nr*s.cols + nc], threatLevel);
                    }
                } else {
                    [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}].forEach(d => {
                        for(let i=1; i<=b.range; i++) {
                           let nc = b.c + d.x*i, nr = b.r + d.y*i;
                           if(nc<=0 || nc>=s.cols-1 || nr<=0 || nr>=s.rows-1 || s.board[nr*s.cols + nc] === 1) break; 
                           map[nr*s.cols + nc] = Math.max(map[nr*s.cols + nc], threatLevel); if(s.board[nr*s.cols + nc] === 2) break; 
                        }
                    });
                }
            });
            return map;
          },
          bfsFindPath: (startC, startR, targetCond, dangerMap, s, bot, maxDepth = 40, ignoreDanger = false) => {
            if (targetCond(startC, startR)) return []; 
            let queue = [{c: startC, r: startR, path: []}]; let visited = new Set([`${startC},${startR}`]);
            const dirs = [[0,-1],[0,1],[-1,0],[1,0]].sort(() => Math.random() - 0.5);
            while (queue.length > 0) {
              let curr = queue.shift(); if (curr.path.length >= maxDepth) continue;
              for (const [dc, dr] of dirs) {
                const nc = curr.c + dc; const nr = curr.r + dr;
                if (BotAI.getWalkable(nc, nr, s, bot, startC, startR) && !visited.has(`${nc},${nr}`)) {
                  if (!ignoreDanger && dangerMap[nr * s.cols + nc] > 0) continue;
                  if (ignoreDanger && dangerMap[nr * s.cols + nc] === 2) continue; 
                  visited.add(`${nc},${nr}`); const newPath = [...curr.path, {c: nc, r: nr}];
                  if (targetCond(nc, nr)) return newPath; queue.push({c: nc, r: nr, path: newPath});
                }
              }
            }
            return null; 
          },
          isSafeToDropBombAt: (myC, myR, bot, s) => {
              const activeCount = s.bombs.filter(b => b.owner === bot.id && !b.exploded).length;
              const testBomb = { c: myC, r: myR, range: bot.range, isDirty: bot.hasDirty && activeCount===0, isMega: bot.hasMega && activeCount===0 && !bot.hasDirty, dx: 0, dy: 0, timer: 3000 };
              const futureDangerMap = BotAI.buildDangerMap(s, [testBomb]);

                  const teammates = s.players.filter(p => p.team === bot.team && p.id !== bot.id && p.alive);
                  for (let tm of teammates) { const tmC = Math.floor(tm.x/TILE_SIZE); const tmR = Math.floor(tm.y/TILE_SIZE); if (futureDangerMap[tmR*s.cols + tmC] > 0) return false; }
              }

              const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
              while (queue.length > 0) {

                      }
                  }
              }
              return false;

                ctx.save(); ctx.scale(state.current.currentRes, state.current.currentRes); ctx.clearRect(0, 0, width, height);
                if (GameJuice.shakeIntensity > 0) ctx.translate((Math.random()-0.5)*GameJuice.shakeIntensity, (Math.random()-0.5)*GameJuice.shakeIntensity); 
                if (bgCanvasRef.current) ctx.drawImage(bgCanvasRef.current, 0, 0, width, height);

                s.fallingBlocks.forEach(b => { ctx.save(); ctx.translate(b.c*TILE_SIZE, b.r*TILE_SIZE + b.y); Renderer.drawHardBlock(ctx, 0, 0, false, currentTheme); ctx.restore(); });
                s.powerups.forEach(pu => Renderer.drawItemBox(ctx, pu.type, pu.px, pu.py, pu.z, s.frame));
                s.bombs.filter(b=>!b.carriedBy).forEach(b => Renderer.drawBomb(ctx, b));

                if (s.boss) Renderer.drawBoss(ctx, s.boss, s.frame);

                s.explosions.forEach(e => {
                   const sizeMod = Math.sin((e.timer / e.maxTimer) * Math.PI); if (sizeMod <= 0) return;
                   const padding = (1 - sizeMod) * (TILE_SIZE / 2); const bx = e.c * TILE_SIZE + padding; const by = e.r * TILE_SIZE + padding; const bSize = TILE_SIZE - (padding * 2);
                   ctx.globalCompositeOperation = 'screen'; ctx.fillStyle = e.isDirty ? '#059669' : (e.isMega ? '#C026D3' : '#EA580C'); ctx.fillRect(bx, by, bSize, bSize);
                   if (sizeMod > 0.4) {
                       ctx.fillStyle = e.isDirty ? '#34D399' : (e.isMega ? '#E879F9' : '#FBBF24');
                       const p2 = padding + (bSize * 0.15); const s2 = bSize * 0.7; ctx.fillRect(e.c*TILE_SIZE + p2, e.r*TILE_SIZE + p2, s2, s2);
                       ctx.fillStyle = '#FFF'; const p3 = padding + (bSize * 0.35); const s3 = bSize * 0.3; ctx.fillRect(e.c*TILE_SIZE + p3, e.r*TILE_SIZE + p3, s3, s3);
                   } ctx.globalCompositeOperation = 'source-over';
                });

                [...s.players].sort((a,b)=>a.y - b.y).forEach(p => Renderer.drawPlayer(ctx, p, s.frame));
                s.bombs.filter(b=>b.carriedBy).forEach(b => Renderer.drawBomb(ctx, b));

                GameJuice.shockwaves.forEach(sw => { ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI*2); ctx.lineWidth = 4 * sw.life; ctx.strokeStyle = sw.color; ctx.globalAlpha = sw.life; ctx.stroke(); ctx.globalAlpha = 1.0; });

                GameJuice.particles.forEach(p => {
                   if (p.text) { 
                       ctx.fillStyle = p.color; ctx.font='bold 14px "Press Start 2P", monospace'; ctx.textAlign='center'; 
                       ctx.lineWidth=3; ctx.strokeStyle='#000'; ctx.strokeText(p.text, p.x, p.y); ctx.fillText(p.text, p.x, p.y); 
                   } else if (p.type === 'wood') {
                       ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore();
                   } else { 
                       ctx.fillStyle = p.color; let alpha = Math.max(0, p.life/p.maxLife); if (p.type === 'smoke' || p.type === 'dust') alpha *= 0.35; 
                       ctx.globalAlpha = alpha; ctx.beginPath(); ctx.arc(p.x, p.y, p.size || 4, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0;
                   }
                });

                const gradient = ctx.createRadialGradient(width/2, height/2, height/2, width/2, height/2, width);
                gradient.addColorStop(0, 'transparent'); gradient.addColorStop(1, 'rgba(0,0,0,0.6)'); ctx.fillStyle = gradient; ctx.fillRect(0, 0, width, height);

                if (s.freezeTimer > 0) {
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.15)'; ctx.fillRect(0,0,width, height); ctx.fillStyle = '#00FFFF'; ctx.font='bold 30px "Press Start 2P"'; ctx.textAlign='center'; 
                    ctx.lineWidth=6; ctx.strokeStyle='#000'; ctx.strokeText("TIME FROZEN", width/2, height/2); ctx.fillText("TIME FROZEN", width/2, height/2);
                }

                if (s.winner) {
                  ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, width, height);
                  const scale = 1 + Math.sin(Date.now() / 200) * 0.05; ctx.save(); ctx.translate(width/2, height/2); ctx.scale(scale, scale);
                  ctx.fillStyle = s.winner === 'DRAW!' ? '#AAA' : (s.winner === 'BOSS DEFEATED!' ? '#10B981' : '#FFD700'); ctx.font = '36px "Press Start 2P", monospace'; ctx.textAlign = 'center'; ctx.textBaseline='middle';
                  ctx.lineWidth = 6; ctx.strokeStyle = '#000'; ctx.strokeText(s.winner, 0, -10); ctx.fillText(s.winner, 0, -10);
                  ctx.font = '12px "Press Start 2P", monospace'; ctx.fillStyle = '#FFF'; ctx.lineWidth = 3; ctx.strokeText("TAP TO CONTINUE", 0, 40); ctx.fillText("TAP TO CONTINUE", 0, 40);
                  ctx.restore();
                } ctx.restore();
            } catch(err) { console.error("Render Loop Error:", err); }
          };

          const gameLoop = (time) => {
            if (!lastTimeRef.current) lastTimeRef.current = time;
            let dt = time - lastTimeRef.current; lastTimeRef.current = time; if (dt > 30) dt = 30; 

            if (viewRef.current === 'playing' && state.current) {
               if (hitStopRef.current > 0) { hitStopRef.current -= dt; } 
               else {
                   const s = state.current; s.frame++;
                   if (!s.winner) {
                       handlePlayerInput(dt); updateBots(dt); updateEntities(dt); handleItemCollection(); GameJuice.update(dt);
                       if (s.frame > 300) {
                           if (s.mode.id === 'boss') { if (s.boss && !s.boss.active) { s.winTimer += dt; if (s.winTimer > 2000) s.winner = 'BOSS DEFEATED!'; } else if (!s.players.some(p => p.alive)) { s.winTimer += dt; if (s.winTimer > 2000) s.winner = 'GAME OVER'; } } 
                           else {
                               if (s.mode.isTeam) {
                                   const aliveTeams = new Set(s.players.filter(p=>p.alive).map(p=>p.team));
                                   if (aliveTeams.size <= 1) { s.winTimer += dt; if (s.winTimer > 1500) s.winner = aliveTeams.size===1 ? `TEAM ${Array.from(aliveTeams)[0]} WINS!` : 'DRAW!'; } else { s.winTimer = 0; }
                               } else {
                                   let activeCount = 0; let lastAlive = null; for (let i=0; i<s.players.length; i++) { if (s.players[i].alive) { activeCount++; lastAlive = s.players[i]; } }
                                   if (activeCount <= 1) { s.winTimer += dt; if (s.winTimer > 1500) s.winner = (activeCount === 1 && lastAlive) ? `${lastAlive.name} WINS!` : 'DRAW!'; } else { s.winTimer = 0; }
                               }
