        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;700;800;900&display=swap');

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const Icon = ({ path, size = 24, className = "", fill="none" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{__html: path}} /> );
        const RefreshCw = (p) => <Icon {...p} path='<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>'/>;
        const Share2 = (p) => <Icon {...p} path='<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>'/>;
        const UserIcon = (p) => <Icon {...p} path='<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>'/>;
        const SquareIcon = (p) => <Icon {...p} path='<rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>'/>;
        const TrophyIcon = (p) => <Icon {...p} path='<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>'/>;
        const Loader2 = (p) => <Icon {...p} path='<path d="M21 12a9 9 0 1 1-6.219-8.56"/>'/>;
        const ChevronRight = (p) => <Icon {...p} path='<path d="m9 18 6-6-6-6"/>'/>;
        const ArrowLeft = (p) => <Icon {...p} path='<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>'/>;
        const StarIcon = (p) => <Icon {...p} path='<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>'/>;
        const AlertCircle = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'/>;
        const PopcornIcon = (p) => <Icon {...p} path='<path d="M4 11h16v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9Z"/><path d="M4 11V8.5A2.5 2.5 0 0 1 6.5 6h11A2.5 2.5 0 0 1 20 8.5V11"/><path d="M8.5 6V4.5A2.5 2.5 0 0 1 11 2h2a2.5 2.5 0 0 1 2.5 2.5V6"/><path d="M12 11v10"/><path d="M8 11v10"/><path d="M16 11v10"/>'/>;
        const DownloadIcon = (p) => <Icon {...p} path='<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>'/>;
        const TvIcon = (p) => <Icon {...p} path='<rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/>'/>;
        const MicIcon = (p) => <Icon {...p} path='<path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/>'/>;

        const TMDB_KEY = '3ea9e43d0b879725ac8fda707021e858';
        const THEME = { sports: { primary: '#00E5FF', secondary: '#0066FF', bg: 'ambient-sports' }, movies: { primary: '#FFB800', secondary: '#FF3D5A', bg: 'ambient-movies' }, tv: { primary: '#D946EF', secondary: '#7C3AED', bg: 'ambient-tv' } };

        const MOVIE_CATS = [ { id: 'actors', name: 'HOLLYWOOD ICONS', icon: '🌟', isActorMode: true }, { id: 'popular', name: 'POPULAR BLOCKBUSTERS', icon: '🔥', endpoint: '/discover/movie?sort_by=popularity.desc&with_original_language=en&without_genres=16' }, { id: 'top_rated', name: 'TOP RATED OF ALL TIME', icon: '⭐', endpoint: '/discover/movie?sort_by=vote_average.desc&vote_count.gte=4000&with_original_language=en&without_genres=16' } ];
        const TV_CATS = [ { id: 'popular', name: 'POPULAR SHOWS', icon: '🔥', endpoint: '/discover/tv?sort_by=popularity.desc&with_original_language=en&without_genres=10763,10764' }, { id: 'top_rated', name: 'TOP RATED SERIES', icon: '⭐', endpoint: '/discover/tv?sort_by=vote_average.desc&vote_count.gte=1500&with_original_language=en&without_genres=10763,10764' } ];
        const ACTORS_DATA = [ "Adam Sandler", "Al Pacino", "Angelina Jolie", "Anthony Hopkins", "Brad Pitt", "Cate Blanchett", "Christian Bale", "Cillian Murphy", "Denzel Washington", "Emma Stone", "Harrison Ford", "Heath Ledger", "Jim Carrey", "Joaquin Phoenix", "Johnny Depp", "Julia Roberts", "Keanu Reeves", "Leonardo DiCaprio", "Margot Robbie", "Meryl Streep", "Morgan Freeman", "Robert De Niro", "Robin Williams", "Ryan Gosling", "Samuel L. Jackson", "Scarlett Johansson", "Tom Cruise", "Tom Hanks", "Will Smith", "Zendaya" ].sort();
        
        const SPORTS_ROSTERS = {
            'Soccer': ["Lionel Messi", "Cristiano Ronaldo", "Neymar", "Kylian Mbappe", "Zinedine Zidane", "David Beckham", "Thierry Henry", "Ronaldinho", "Diego Maradona", "Pele", "Sergio Ramos", "Wayne Rooney", "Zlatan Ibrahimovic", "Andres Iniesta", "Xavi", "Gareth Bale"],
            'Basketball': ["Michael Jordan", "LeBron James", "Kobe Bryant", "Shaquille O'Neal", "Stephen Curry", "Magic Johnson", "Larry Bird", "Kevin Durant", "Dennis Rodman", "Carmelo Anthony", "Dwyane Wade"],
            'American Football': ["Tom Brady", "Peyton Manning", "Aaron Rodgers", "Patrick Mahomes", "Jerry Rice", "Rob Gronkowski", "Brett Favre", "Drew Brees", "Odell Beckham Jr"],
            'Motorsport': ["Lewis Hamilton", "Michael Schumacher", "Ayrton Senna", "Max Verstappen", "Sebastian Vettel", "Fernando Alonso", "Niki Lauda", "Charles Leclerc", "Lando Norris", "Daniel Ricciardo"]
        };
        const SPORTS = [ { id: 'Soccer', name: 'FOOTBALL LEGENDS', icon: '⚽' }, { id: 'Basketball', name: 'NBA ICONS', icon: '🏀' }, { id: 'American Football', name: 'NFL GREATS', icon: '🏈' }, { id: 'Motorsport', name: 'F1 LEGENDS', icon: '🏎️' } ];

        const fmt = ms => `${Math.floor(ms / 1000)}.${Math.floor((ms % 1000) / 100)}s`;

        function App() {
          const [phase, setPhase] = useState('menu'); 
          const [navStack, setNavStack] = useState(['domain']); 
          const [selection, setSelection] = useState({ domain: null, sport: null, movieCat: null, actor: null });
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState(null);
          
          const [slots, setSlots] = useState(Array(10).fill(null));
          const [queue, setQueue] = useState([]);
          const [activeIndex, setActiveIndex] = useState(0);
          
          const [rolling, setRolling] = useState(false);
          const [ms, setMs] = useState(0);
          const [flashSlot, setFlashSlot] = useState(null);
          const [challengeTitle, setChallengeTitle] = useState("BLIND RANK");

          const [recordStatus, setRecordStatus] = useState('idle'); 
          const [recordedVideoUrl, setRecordedVideoUrl] = useState(null);
          const [aiStatus, setAiStatus] = useState('waiting'); 

          // Deep Refs for Engine
          const videoRef = useRef(null);
          const streamRef = useRef(null); // Stores audio+video track for recording
          const canvasRef = useRef(null); // HD Canvas for Video Generation
          const cardRef = useRef(null);   // Live DOM Card for User UI
          const mediaRecorderRef = useRef(null);
          const chunksRef = useRef([]);

          // Absolute Coordinate Trackers to ensure pixel-perfect head tracking
          const posRef = useRef({ 
              targetX: window.innerWidth / 2, targetY: window.innerHeight * 0.25, targetScale: 0.85, detected: false,
              domX: window.innerWidth / 2, domY: window.innerHeight * 0.25, domScale: 0.85,
              canvasX: 720 / 2, canvasY: 1280 * 0.25, canvasScale: 0.85
          });
          
          const latestSlots = useRef(slots);
          const latestActiveIndex = useRef(activeIndex);
          const latestQueue = useRef(queue);
          const latestPhase = useRef(phase);
          const latestRolling = useRef(rolling);
          const isRecordingRef = useRef(false);
          const tickRef = useRef(null);

          const currentNav = navStack[navStack.length - 1];
          let activeTheme = THEME.sports;
          if (selection.domain === 'movies' || currentNav === 'movies' || currentNav === 'actors') activeTheme = THEME.movies;
          if (selection.domain === 'tv' || currentNav === 'tv') activeTheme = THEME.tv;
          const themeRef = useRef(activeTheme);

          useEffect(() => { latestSlots.current = slots; }, [slots]);
          useEffect(() => { latestActiveIndex.current = activeIndex; }, [activeIndex]);
          useEffect(() => { latestQueue.current = queue; }, [queue]);
          useEffect(() => { latestPhase.current = phase; }, [phase]);
          useEffect(() => { latestRolling.current = rolling; }, [rolling]);
          useEffect(() => { themeRef.current = activeTheme; }, [activeTheme]);

          useEffect(() => {
            let active = true;
            let faceDetection = null;
            
            async function initEngine() {
              // 1. Initialize Dual-Media Stream (Video + Audio)
              try {
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                  const stream = await navigator.mediaDevices.getUserMedia({ 
                      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }, 
                      audio: true // Captures microphone for commentary
                  });
                  streamRef.current = stream; // Store so we can extract audio tracks later
                  
                  if (active && videoRef.current) {
                      videoRef.current.srcObject = stream;
                      await videoRef.current.play().catch(e => console.warn(e));
                  }
                }
              } catch (err) { console.warn("Camera/Mic denied."); }

              // 2. Initialize Ultra-Stable FaceDetection Engine
              if (window.FaceDetection) {
                  faceDetection = new window.FaceDetection({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4.1646425201/${file}` });
                  faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.4 });
                  faceDetection.onResults((results) => {
                      if (!active) return;
                      const p = posRef.current;
                      if (results.detections && results.detections.length > 0) {
                          p.detected = true;
                          const box = results.detections[0].boundingBox;
                          // Use xCenter if available, otherwise calculate it
                          const bx = box.xCenter !== undefined ? box.xCenter : box.xMin + box.width/2;
                          const by = box.yCenter !== undefined ? box.yCenter : box.yMin + box.height/2;
                          const bw = box.width;
                          const bh = box.height;

                          const faceXNorm = 1.0 - bx; // Mirrored
                          const faceYNorm = by - (bh * 0.4); // Forehead anchor
                          
                          p.normX = faceXNorm;
                          p.normY = faceYNorm;
                          p.normW = bw;
                      } else {
                          p.detected = false;
                      }
                  });
                  setAiStatus('ready');
              } else {
                  setAiStatus('error');
              }

              // Engine Core Variables
              let lastVideoTime = -1;
              const startMs = Date.now();
              tickRef.current = setInterval(() => { if (latestPhase.current === 'playing') setMs(Date.now() - startMs); }, 100);

              // 3. Unified Render Loop
              const loop = async () => {
                  if (!active) return;
                  const video = videoRef.current;
                  
                  // A. Execute AI detection if frame changed
                  if (video && video.readyState >= 2 && faceDetection && aiStatus === 'ready') {
                      if (video.currentTime !== lastVideoTime) {
                          lastVideoTime = video.currentTime;
                          try { await faceDetection.send({image: video}); } catch(e) {}
                      }
                  }

                  const sw = window.innerWidth, sh = window.innerHeight;
                  const p = posRef.current;

                  // B. Calculate Exact DOM Pixels (For the Live UI Card)
                  if (video && video.videoWidth > 0 && latestPhase.current === 'playing') {
                      const vw = video.videoWidth, vh = video.videoHeight;
                      let drawW = sw, drawH = sh, offsetX = 0, offsetY = 0;
                      
                      // Object-cover crop logic to find real pixels
                      if (sw / sh > vw / vh) { drawH = sw / (vw / vh); offsetY = (sh - drawH) / 2; } 
                      else { drawW = sh * (vw / vh); offsetX = (sw - drawW) / 2; }

                      if (p.detected) {
                          p.targetX = offsetX + (p.normX * drawW);
                          p.targetY = offsetY + (p.normY * drawH);
                          p.targetScale = Math.min(1.1, Math.max(0.65, p.normW * 3));
                      } else {
                          p.targetX = sw / 2; p.targetY = sh * 0.25; p.targetScale = 0.85;
                      }

                      // Smooth pixel lerp
                      p.domX += (p.targetX - p.domX) * 0.4;
                      p.domY += (p.targetY - p.domY) * 0.4;
                      p.domScale += (p.targetScale - p.domScale) * 0.4;

                      // Apply Absolute Pixels to Card (Perfect Head Tracking)
                      if (cardRef.current) {
                          cardRef.current.style.left = `${p.domX}px`;
                          cardRef.current.style.top = `${p.domY}px`;
                          cardRef.current.style.transform = `translate(-50%, -50%) scale(${p.domScale})`;
                      }
                  }

                  // C. High-Definition Canvas Compositor (For Video Output)
                  if (isRecordingRef.current && canvasRef.current && video) {
                      const canvas = canvasRef.current;
                      const ctx = canvas.getContext('2d');
                      const CW = 720, CH = 1280; // Hardcoded HD ratio for video export
                      canvas.width = CW; canvas.height = CH;
                      ctx.clearRect(0, 0, CW, CH);

                      const vw = video.videoWidth, vh = video.videoHeight;
                      if (vw > 0 && vh > 0) {
                          // Draw Background Camera
                          let cDrawW = CW, cDrawH = CH;
                          if (CW / CH > vw / vh) cDrawH = CW / (vw / vh); else cDrawW = CH * (vw / vh); 
                          const cOffsetX = (CW - cDrawW) / 2, cOffsetY = (CH - cDrawH) / 2;
                          ctx.save(); ctx.translate(CW, 0); ctx.scale(-1, 1);
                          ctx.drawImage(video, cOffsetX, cOffsetY, cDrawW, cDrawH);
                          ctx.restore();

                          // Update Canvas-Specific Tracking Targets
                          let targetCx = CW / 2, targetCy = CH * 0.25;
                          if (p.detected) {
                              targetCx = cOffsetX + (p.normX * cDrawW);
                              targetCy = cOffsetY + (p.normY * cDrawH);
                          }
                          p.canvasX += (targetCx - p.canvasX) * 0.4;
                          p.canvasY += (targetCy - p.canvasY) * 0.4;
                          p.canvasScale += (p.targetScale - p.canvasScale) * 0.4;
                      }

                      ctx.fillStyle = 'rgba(3, 3, 5, 0.4)'; ctx.fillRect(0, 0, CW, CH);

                      // Draw HD Sidebar
                      const curSlots = latestSlots.current;
                      const sbLeft = 40, sbWidth = 100, sbTop = 200, sbBottom = 200;
                      const slotH = (CH - sbTop - sbBottom) / 10;
                      
                      ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(sbLeft + sbWidth/2 - 1, sbTop, 2, CH - sbTop - sbBottom);

                      curSlots.forEach((slotData, i) => {
                          const y = sbTop + i * slotH + 4; const th = slotH - 8;
                          ctx.fillStyle = slotData ? '#ffffff' : 'rgba(255,255,255,0.4)';
                          ctx.font = '900 24px "Outfit", sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                          ctx.fillText(i + 1, sbLeft - 10, y + th/2);

                          const boxX = sbLeft + 20, boxW = sbWidth;
                          ctx.fillStyle = slotData ? 'rgba(255,255,255,0.15)' : 'rgba(3,3,5,0.6)';
                          ctx.beginPath(); ctx.roundRect(boxX, y, boxW, th, 16); ctx.fill();
                          ctx.strokeStyle = themeRef.current.primary; ctx.lineWidth = slotData ? 4 : 2;
                          if (slotData) { ctx.stroke(); } else { ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.stroke(); }
                          
                          if (slotData?.imgObj && slotData.imgObj.complete) {
                              ctx.save(); ctx.beginPath(); ctx.roundRect(boxX + 4, y + 4, boxW - 8, th - 8, 12); ctx.clip();
                              const iw = slotData.imgObj.width, ih = slotData.imgObj.height;
                              const bw = boxW - 8, bh = th - 8;
                              let iwD = bw, ihD = bh; if (iw/ih > bw/bh) { iwD = ihD * (iw/ih); } else { ihD = iwD / (iw/ih); }
                              ctx.drawImage(slotData.imgObj, boxX + 4 + (bw-iwD)/2, y + 4 + (bh-ihD)/2, iwD, ihD); 
                              ctx.restore();
                          } else if (!slotData) {
                              ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(boxX + boxW/2, y + th/2, 4, 0, Math.PI*2); ctx.fill(); 
                          }
                      });

                      // Draw HD Floating Card
                      const activeItem = latestQueue.current[latestActiveIndex.current];
                      if (activeItem) {
                          ctx.save();
                          ctx.translate(p.canvasX, p.canvasY); 
                          ctx.scale(p.canvasScale, p.canvasScale);
                          
                          ctx.shadowColor = themeRef.current.primary; ctx.shadowBlur = 50;
                          ctx.fillStyle = '#030305'; ctx.beginPath(); ctx.roundRect(-120, -120, 240, 240, 40); ctx.fill();
                          ctx.shadowBlur = 0; ctx.lineWidth = 8; ctx.strokeStyle = themeRef.current.primary; ctx.stroke();
                          
                          if (activeItem.imgObj && activeItem.imgObj.complete && !latestRolling.current) {
                              ctx.save(); ctx.beginPath(); ctx.roundRect(-112, -112, 224, 224, 32); ctx.clip();
                              const iw = activeItem.imgObj.width, ih = activeItem.imgObj.height;
                              let dw = 224, dh = 224; if (iw/ih > 1) { dw = dh * (iw/ih); } else { dh = dw / (iw/ih); }
                              ctx.drawImage(activeItem.imgObj, -112 + (224-dw)/2, -112 + (224-dh)/2, dw, dh); ctx.restore();
                          }
                          
                          ctx.fillStyle = themeRef.current.primary; ctx.beginPath(); ctx.roundRect(-140, 140, 280, 60, 24); ctx.fill();
                          ctx.fillStyle = '#030305'; ctx.font = '900 22px "Outfit", sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                          ctx.fillText((latestRolling.current ? "SELECTING..." : activeItem.name).toUpperCase(), 0, 170);
                          ctx.restore();
                      }
                  }
                  requestAnimationFrame(loop);
              };
              loop();
            }

            initEngine();
            return () => { active = false; if(tickRef.current) clearInterval(tickRef.current); if(faceDetection) faceDetection.close(); };
          }, []);

          // ── AUDIO & VIDEO MUXING RECORDER ──
          const startRecording = async () => {
            if (recordStatus !== 'idle' && recordStatus !== 'error') return;
            chunksRef.current = [];
            isRecordingRef.current = true;
            
            try {
              if (!canvasRef.current || !canvasRef.current.captureStream) throw new Error("captureStream missing");
              
              // 1. Capture the 30FPS UI Video stream
              const canvasStream = canvasRef.current.captureStream(30);
              
              // 2. Mux (combine) the Microphone Audio track from the main camera stream
              const audioTracks = streamRef.current?.getAudioTracks() || [];
              if (audioTracks.length > 0) {
                  canvasStream.addTrack(audioTracks[0]);
              }
              
              let options = { mimeType: 'video/webm;codecs=vp8,opus' };
              if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm' };
              if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/mp4' };
              
              mediaRecorderRef.current = new MediaRecorder(canvasStream, options);
              mediaRecorderRef.current.ondataavailable = e => { if (e.data && e.data.size > 0) chunksRef.current.push(e.data); };
              mediaRecorderRef.current.onstop = () => {
                 isRecordingRef.current = false;
                 if (chunksRef.current.length === 0) { setRecordStatus('error'); return; }
                 const finalMime = mediaRecorderRef.current.mimeType || options.mimeType;
                 const blob = new Blob(chunksRef.current, { type: finalMime });
                 setRecordedVideoUrl({ url: URL.createObjectURL(blob), ext: finalMime.includes('mp4') ? 'mp4' : 'webm' });
                 setRecordStatus('ready'); 
              };
              mediaRecorderRef.current.start(); 
              setRecordStatus('recording');
            } catch (e) { 
              isRecordingRef.current = false;
              setError("Screen recording unsupported on this browser."); 
              setRecordStatus('error');
            }
          };

          const stopRecordingAndCompile = () => {
            if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
              setRecordStatus('compiling'); 
              mediaRecorderRef.current.stop();
            } else {
               if (chunksRef.current.length > 0) setRecordStatus('ready'); else setRecordStatus('error');
            }
          };

          // ── SECURE BLOB PRELOADER ──
          const processSessionAndLaunch = async (session) => {
             setLoading(true);
             const enrichedSession = [];
             
             for (const item of session) {
                 try {
                     const proxyUrl = `https://wsrv.nl/?url=${encodeURIComponent(item.img)}&output=webp`;
                     const res = await fetch(proxyUrl);
                     if (res.ok) {
                         const blob = await res.blob();
                         const blobUrl = URL.createObjectURL(blob); 
                         
                         const imgObj = await new Promise((resolve) => {
                             const img = new Image();
                             img.onload = () => resolve(img);
                             img.onerror = () => resolve(null); 
                             img.src = blobUrl; 
                         });
                         
                         if (imgObj) enrichedSession.push({ ...item, imgObj });
                     }
                 } catch (e) { console.warn("Failed to load image securely."); }
             }

             setLoading(false);
             if (enrichedSession.length < 5) { setError("Network blocked images. Please try again."); return; }

             setSlots(Array(10).fill(null)); 
             setQueue(enrichedSession);
             setActiveIndex(0);
             setRecordStatus('idle'); setRecordedVideoUrl(null);
             setPhase('playing');
             
             setRolling(true);
             setTimeout(() => setRolling(false), 800);
          };

          const fetchTMDB = async (e, p=1) => { 
              try { 
                  const sep = e.includes('?') ? '&' : '?'; 
                  const res = await fetch(`https://api.themoviedb.org/3${e}${sep}api_key=${TMDB_KEY}&language=en-US&page=${p}`); 
                  return res.ok ? await res.json() : null; 
              } catch(x) { return null; } 
          };

          const pickDomain = (domain) => { setSelection({ domain, sport: null, movieCat: null, actor: null }); setNavStack([domain]); };

          const startSportsChallenge = async (sport) => {
            setLoading(true); setError(null); setSelection(p => ({ ...p, sport }));
            try {
              const roster = [...SPORTS_ROSTERS[sport.id]].sort(() => Math.random() - 0.5).slice(0, 12);
              const players = [];
              
              for (const name of roster) {
                  const res = await fetchTMDB(`/search/person?query=${encodeURIComponent(name)}`);
                  if (res?.results?.length > 0 && res.results[0].profile_path) {
                      players.push({ id: res.results[0].id, name: res.results[0].name, img: `https://image.tmdb.org/t/p/w780${res.results[0].profile_path}` });
                  }
              }
              if (players.length < 10) { setError(`Not enough images found.`); setLoading(false); return; }
              setChallengeTitle(sport.name); processSessionAndLaunch(players.slice(0, 10));
            } catch (e) { setError("Database sync error."); setLoading(false); }
          };

          const startActorChallenge = async (actorName) => {
            setLoading(true); setError(null); setSelection(p => ({ ...p, actor: actorName }));
            try {
              const searchRes = await fetchTMDB(`/search/person?query=${encodeURIComponent(actorName)}`);
              if (!searchRes?.results?.length) throw new Error();
              const creditsRes = await fetchTMDB(`/person/${searchRes.results[0].id}/movie_credits`);
              if (!creditsRes?.cast) throw new Error();
              const movies = creditsRes.cast.filter(m => m.poster_path && m.title).sort((a, b) => b.popularity - a.popularity);
              
              const unique = Array.from(new Map(movies.map(m => [m.id, { id: m.id, name: m.title, img: `https://image.tmdb.org/t/p/w780${m.poster_path}` }])).values());
              if (unique.length < 10) { setError(`${actorName} has too few movies.`); setLoading(false); return; }
              const topMovies = unique.slice(0, 30).sort(() => Math.random() - 0.5).slice(0, 10);
              
              setChallengeTitle(actorName.toUpperCase()); processSessionAndLaunch(topMovies);
            } catch (e) { setError(`Failed to load ${actorName}.`); setLoading(false); }
          };

          const startTMDBChallenge = async (cat) => {
            setLoading(true); setError(null); setSelection(p => ({ ...p, movieCat: cat }));
            try {
              const r1 = Math.floor(Math.random() * 5) + 1; let r2 = Math.floor(Math.random() * 5) + 1; if(r1 === r2) r2 = (r2%5)+1;
              const results = await Promise.all([ fetchTMDB(cat.endpoint, r1), fetchTMDB(cat.endpoint, r2) ]);
              const allMedia = results.flatMap(r => r?.results || []);
              
              const finalPool = allMedia.filter(m => m.poster_path && (m.title || m.name)).filter(m => { if (cat.id === 'animation') return true; return m.genre_ids && !m.genre_ids.includes(16); }).map(m => ({ id: m.id, name: m.title || m.name, img: `https://image.tmdb.org/t/p/w780${m.poster_path}` }));
              const unique = Array.from(new Map(finalPool.map(item => [item.id, item])).values());
              const sessionMedia = unique.sort(() => Math.random() - 0.5).slice(0, 10);
              
              if (sessionMedia.length < 10) { setError("Not enough data found."); setLoading(false); return; }
              setChallengeTitle(cat.name); processSessionAndLaunch(sessionMedia);
            } catch (e) { setError("Error syncing with Database."); setLoading(false); }
          };

          const place = (i) => {
            if (slots[i] !== null || rolling || activeIndex >= 10) return;
            
            const n = [...slots]; 
            n[i] = queue[activeIndex];
            setSlots(n); 
            setFlashSlot(i); setTimeout(() => setFlashSlot(null), 300);
            
            const nextIdx = activeIndex + 1;
            if (nextIdx >= 10) { 
                setTimeout(() => { setPhase('result'); }, 600); 
            } else { 
                setRolling(true);
                setTimeout(() => { setActiveIndex(nextIdx); setRolling(false); }, 800);
            }

          const back = () => {
            setError(null); setLoading(false);

                </>

              {phase === 'playing' && (

              {phase === 'playing' && (
                <div className="absolute left-4 top-[110px] bottom-[110px] w-[70px] flex flex-col justify-between z-50">
                  {slots.map((p, i) => (
                    <button key={i} onClick={() => place(i)} disabled={!!p || rolling} className="flex-1 w-full opacity-0" />

                </div>

                        </button>

                          <div className="w-3 h-3 rounded-full bg-[#ffffff] animate-pulse" />
                          <span className="display-font text-[12px] font-black tracking-widest text-white">STOP RECORDING</span>

                    <span className={`display-font font-black text-sm tracking-widest`} style={{ color: activeTheme.primary }}>{fmt(ms)}</span>

                    <div className="flex items-center justify-between mb-8 shrink-0">
                      {currentNav !== 'domain' ? (
                        <button onClick={back} className="w-12 h-12 rounded-full glass-premium border-white/20 hover:bg-white/10 flex items-center justify-center active:scale-95 transition-all shadow-lg">

                                <TvIcon size={56} className="text-[#D946EF] mb-4 group-hover:scale-110 transition-transform drop-shadow-[0_0_20px_rgba(217,70,239,0.6)]" />
                                <span className="display-font font-black text-2xl tracking-[0.25em] text-white">TV SHOWS</span>
                                <span className="body-font text-[10px] text-[#D946EF] mt-2 font-bold tracking-[0.2em]">THE GREATEST SERIES</span>
                              </button>
                            </div>
                          )}

                          {currentNav === 'movies' && MOVIE_CATS.map((c, i) => (
                            <button key={c.id} onClick={() => { if (c.isActorMode) setNavStack([...navStack, 'actors']); else startTMDBChallenge(c); }} 
                              className={`w-full flex items-center justify-between glass-premium p-5 rounded-[24px] active:scale-[0.98] transition-all hover:bg-white/10 ${i === 0 ? 'border-[#FFB800]/50 bg-gradient-to-r from-[#FFB800]/10 to-transparent shadow-[0_8px_30px_rgba(255,184,0,0.2)]' : 'border-white/15'}`}>
                              <div className="flex items-center gap-5">
                                <span className="text-3xl drop-shadow-md">{c.icon}</span>

                                  <span className="display-font font-black text-[15px] tracking-widest text-white">{c.name}</span>

                          {currentNav === 'tv' && TV_CATS.map((c, i) => (

                                <div className="flex flex-col items-start text-left">
                                  <span className="display-font font-black text-[15px] tracking-widest text-white">{c.name}</span>
                                </div>
                              </div>
                              <ChevronRight size={20} className="text-[#D946EF]" />
                            </button>
                          ))}

                          {currentNav === 'actors' && (
                            <div className="grid grid-cols-1 gap-3 pb-6">
                              {ACTORS_DATA.map(actor => (
                                <button key={actor} onClick={() => startActorChallenge(actor)} className="w-full flex items-center justify-between glass-premium p-5 rounded-[20px] active:scale-[0.98] transition-all text-left border-white/15 hover:border-[#FFB800]/50 hover:bg-[#FFB800]/5 shadow-sm">
                                  <span className="display-font font-bold text-[14px] tracking-[0.15em] uppercase text-white pl-2">{actor}</span>
                                  <ChevronRight size={18} className="text-[#FFB800]" />
                                </button>
                              ))}
                            </div>
                          )}

                          {currentNav === 'sports' && SPORTS.map((s, i) => (
                            <button key={s.id} onClick={() => startSportsChallenge(s)} className={`w-full flex items-center justify-between glass-premium p-5 rounded-[24px] active:scale-[0.98] transition-all hover:bg-white/10 border-[#00D4FF]/50 bg-gradient-to-r from-[#00D4FF]/10 to-transparent shadow-[0_8px_30px_rgba(0,212,255,0.2)]`}>
                              <div className="flex items-center gap-5">
                                <span className="text-3xl drop-shadow-md">{s.icon}</span>

                                </div>

                              <ChevronRight size={20} className="text-[#00D4FF]" />

                          ))}

              {/* ── NATIVE UI PLAYING CARD (Position mapped flawlessly to Forehead) ── */}
              {phase === 'playing' && (

                       </div>
                    )}
                    
                    {recordStatus === 'recording' && (
                      <button onClick={stopRecordingAndCompile} className={`w-full py-5 rounded-[24px] bg-[#FF3D5A] border border-[#FF3D5A]/50 text-white display-font font-black tracking-widest text-[14px] flex items-center justify-center gap-3 active:scale-[0.98] shadow-[0_15px_40px_rgba(255,61,90,0.4)] transition-all`}>
                        <SquareIcon size={20} fill="white" /> STOP & SAVE VIDEO
                      </button>
                    )}

                    {recordStatus === 'compiling' && (
                      <div className={`w-full py-5 rounded-[24px] glass-premium text-white display-font font-black tracking-widest text-[14px] flex items-center justify-center gap-4 transition-all opacity-90 border-white/20 shadow-xl`}>
                        <Loader2 className="animate-spin text-white" size={24} /> COMPILING VIDEO...
                      </div>
                    )}

                    {recordStatus === 'ready' && recordedVideoUrl && (
                      <a href={recordedVideoUrl.url} download={`BlindRank_Game_${Date.now()}.${recordedVideoUrl.ext}`} className={`w-full py-5 rounded-[24px] display-font font-black tracking-[0.15em] text-[14px] flex items-center justify-center gap-3 active:scale-[0.98] transition-all`} style={{ background: `linear-gradient(135deg, ${activeTheme.primary}, ${activeTheme.secondary})`, color: (selection.domain === 'sports' ? '#fff' : '#030305'), boxShadow: `0 15px 40px ${activeTheme.primary}50` }}>
                        <DownloadIcon size={22} /> DOWNLOAD VIDEO
                      </a>
                    )}

                    <button onClick={() => {
                      const text = `🏆 My Blind Rank: ${challengeTitle}\n${slots.map((p, i) => `${i + 1}. ${p?.name}`).join('\n')}`;
                      if (navigator.share) navigator.share({ title: 'Blind Rank', text });
                    }} className={`w-full py-5 rounded-[24px] glass-premium text-white display-font font-black tracking-[0.15em] text-[14px] flex items-center justify-center gap-3 active:scale-[0.98] hover:bg-white/10 transition-all border-white/20 shadow-xl`}>
                      <Share2 size={20} /> SHARE RANKING LIST
                    </button>
                  </div>
                </div>
              )}

              {/* ── Bottom Ambient Info Pill ── */}
              <div className="absolute bottom-8 sm:bottom-12 inset-x-0 flex justify-center z-30 pointer-events-none pb-safe">
                <div className="glass-premium bg-[#030305]/80 px-6 py-4 rounded-full flex items-center gap-4 shadow-[0_20px_50px_rgba(0,0,0,0.5)] border-white/20">
                  <span className="display-font text-[11px] font-black uppercase tracking-[0.2em] text-white/50">BR-PRO</span>
                  <div className="w-[1.5px] h-4 bg-white/20" />
                  <div className="flex items-center gap-3 min-w-0">
                    <div className={`w-2.5 h-2.5 rounded-full animate-pulse shrink-0`} style={{ backgroundColor: activeTheme.primary, boxShadow: `0 0 15px ${activeTheme.primary}` }} />
                    <span className={`display-font text-[11px] font-black uppercase tracking-widest truncate max-w-[130px]`} style={{ color: activeTheme.primary }}>
                      {challengeTitle === 'BLIND RANK' ? 'SYSTEM READY' : challengeTitle}
                    </span>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
